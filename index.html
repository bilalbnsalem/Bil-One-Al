<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bil-One-Al</title>

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0}

body{
  color:white;
  min-height:100vh;

  /* 🎨 خلفية تجارة إلكترونية احترافية */
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1607082349566-187342175e2f");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(10,15,30,0.7);
  backdrop-filter:blur(10px);
}

/* NAME */
h1{
  color:#38bdf8;
  font-size:20px;
}

/* RIGHT BUTTONS */
.top-actions{
  display:flex;
  gap:10px;
  align-items:center;
}

/* BUTTON */
button{
  background:#38bdf8;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* CART BUTTON */
.cart-btn{
  background:#1e293b;
  color:white;
  padding:10px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h2{
  font-size:20px;
  max-width:700px;
  margin:auto;
}

/* PRODUCTS */
.container{
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:rgba(30,41,59,0.9);
  padding:10px;
  border-radius:12px;
  backdrop-filter:blur(5px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* FORM */
.form{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:20px;
  width:320px;
  border-radius:10px;
}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:6px;
}

/* CART */
.cart{
  position:fixed;
  top:0;
  right:-320px;
  width:280px;
  height:100%;
  background:#0b1220;
  padding:15px;
  transition:0.3s;
}

.cart.open{right:0}

/* 💬 WHATSAPP 3D ICON */
.whatsapp{
  position:fixed;
  bottom:20px;
  left:20px;

  width:65px;
  height:65px;
  border-radius:50%;

  background:linear-gradient(145deg,#25D366,#1aa34a);
  box-shadow:
    6px 6px 15px rgba(0,0,0,0.6),
    -3px -3px 10px rgba(255,255,255,0.1);

  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  color:white;
  text-decoration:none;

  transition:0.3s;
}

.whatsapp:hover{
  transform:scale(1.1) rotate(-5deg);
}

/* TOP RIGHT LAYOUT */
.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>Bil-One-Al</h1>

  <!-- 🔥 زر إضافة المنتج فوق السلة -->
  <div class="top-actions">
    <button onclick="openForm()">➕ إضافة منتج</button>
    <div class="cart-btn" onclick="toggleCart()">🛒 السلة</div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h2>
    متجر إلكتروني احترافي لبيع المنتجات بسهولة وسرعة مع تجربة تسوق عصرية وآمنة
  </h2>
</div>

<!-- PRODUCTS -->
<div class="container">
  <div class="cards" id="list"></div>
</div>

<!-- FORM -->
<div class="form" id="form">
  <div class="box">
    <h3>إضافة منتج</h3>

    <input id="title" placeholder="اسم المنتج">
    <textarea id="desc" placeholder="الوصف"></textarea>
    <input type="file" id="images" multiple>

    <button onclick="add()">حفظ</button>
    <button onclick="closeForm()" style="background:red;margin-top:5px;">إغلاق</button>
  </div>
</div>

<!-- CART -->
<div class="cart" id="cart"></div>

<!-- 💬 WHATSAPP 3D -->
<a class="whatsapp" href="https://wa.me/21694622377" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("products") || "[]");

/* demo product */
if(products.length===0){
  products=[
    {
      title:"منتج تجريبي",
      desc:"وصف منتج",
      images:["https://images.unsplash.com/photo-1607082349566-187342175e2f"]
    }
  ];
}

/* render */
function render(){
  let box=document.getElementById("list");
  box.innerHTML="";

  products.forEach((p)=>{
    box.innerHTML+=`
      <div class="card">
        <img src="${p.images[0]}">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
      </div>
    `;
  });
}

/* add */
function add(){
  let files=images.files;
  let imgs=[];

  for(let f of files){
    let r=new FileReader();
    r.onload=()=>{
      imgs.push(r.result);

      if(imgs.length===files.length){
        products.push({
          title:title.value,
          desc:desc.value,
          images:imgs
        });

        localStorage.setItem("products",JSON.stringify(products));
        render();
        closeForm();
      }
    }
    r.readAsDataURL(f);
  }
}

/* UI */
function openForm(){form.style.display="flex"}
function closeForm(){form.style.display="none"}
function toggleCart(){cart.classList.toggle("open")}

render();

</script>

</body>
</html>
