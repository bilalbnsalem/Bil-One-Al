<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bil One Al Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    border-bottom:1px solid #222;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#d4af37;
    letter-spacing:3px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:14px;
    transition:.3s;
}

nav a:hover{
    color:#d4af37;
}

.hero{
    height:80vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px;
}

.hero-text{
    max-width:50%;
}

.hero-text h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero-text h1 span{
    color:#d4af37;
}

.hero-text p{
    margin-bottom:30px;
    color:#ccc;
}

.btn{
    background:#d4af37;
    color:black;
    padding:12px 30px;
    border:none;
    cursor:pointer;
    font-weight:700;
    letter-spacing:1px;
}

.products{
    padding:60px;
}

.products h2{
    text-align:center;
    margin-bottom:40px;
    color:#d4af37;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:#111;
    padding:20px;
    text-align:center;
    border:1px solid #222;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#d4af37;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#d4af37;
    margin-bottom:15px;
}

footer{
    border-top:1px solid #222;
    padding:30px;
    text-align:center;
    margin-top:60px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <div class="logo">BIL ONE AL</div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">المتجر</a>
        <a href="#">الأكثر مبيعًا</a>
        <a href="#">تواصل معنا</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>اختر التميز <br><span>كن الرقم واحد</span></h1>
        <p>منتجات مختارة بعناية لتناسب ذوقك الرفيع</p>
        <button class="btn">تسوق الآن</button>
    </div>
    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f" width="40%">
</section>

<section class="products">
    <h2>الأكثر مبيعًا</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
            <h3>عطر فاخر</h3>
            <div class="price">299 ر.س</div>
            <button class="btn">أضف للسلة</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
            <h3>ساعة أنيقة</h3>
            <div class="price">499 ر.س</div>
            <button class="btn">أضف للسلة</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
            <h3>نظارة شمسية</h3>
            <div class="price">199 ر.س</div>
            <button class="btn">أضف للسلة</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598033129183-c4f50c736f10">
            <h3>حقيبة جلد</h3>
            <div class="price">349 ر.س</div>
            <button class="btn">أضف للسلة</button>
        </div>
    </div>
</section>

<footer>
    © 2024 Bil One Al — The One Choice
</footer>

</body>
</html>
