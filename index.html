<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الذكي للتسوق</title>

<style>
*{box-sizing:border-box;font-family:Arial;margin:0;padding:0}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#0b1220);
  color:white;
  min-height:100vh;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#0b1220;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:12px;
  height:12px;
  background:#38bdf8;
  border-radius:50%;
  box-shadow:0 0 10px #38bdf8;
}

/* BUTTON */
button{
  background:#38bdf8;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

.hero img{
  width:300px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.hero h2{
  font-size:18px;
  max-width:700px;
  margin:auto;
}

/* PRODUCTS */
.container{
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* FORM */
.form{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:20px;
  width:320px;
  border-radius:10px;
}

input,textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:6px;
}

/* CART */
.cart-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:#38bdf8;
  color:black;
  padding:10px 12px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

.cart{
  position:fixed;
  top:0;
  right:-320px;
  width:280px;
  height:100%;
  background:#0b1220;
  padding:15px;
  transition:0.3s;
}

.cart.open{right:0}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="logo"></div>
    <h2 style="color:#38bdf8;font-size:18px;">متجر الذكي للتسوق</h2>
  </div>

  <button onclick="openForm()">➕ إضافة منتج</button>
</header>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
  <h2>
    متجر ذكي يجمع بين البساطة في التسوق، الدقة في الاختيار، والسرعة في التوصيل. نحن هنا لنقدم لك تجربة شراء استثنائية.
  </h2>
</div>

<!-- CART -->
<div class="cart-btn" onclick="toggleCart()">🛒 السلة</div>

<div class="cart" id="cart">
  <h3>السلة</h3>
  <div id="cartItems"></div>
</div>

<!-- PRODUCTS -->
<div class="container">
  <div class="cards" id="list"></div>
</div>

<!-- FORM -->
<div class="form" id="form">
  <div class="box">
    <h3>إضافة منتج</h3>

    <input id="title" placeholder="اسم المنتج">
    <textarea id="desc" placeholder="الوصف"></textarea>
    <input type="file" id="images" multiple>

    <button onclick="add()">حفظ</button>
    <button onclick="closeForm()" style="background:red;margin-top:5px;">إغلاق</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/21694622377" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("products") || "[]");
let cart = [];

if(products.length === 0){
  products = [{
    title:"منتج تجريبي",
    desc:"منتج مثال",
    images:["https://images.unsplash.com/photo-1523275335684-37898b6baf30"]
  }];
  localStorage.setItem("products",JSON.stringify(products));
}

/* عرض المنتجات */
function render(){
  let box=document.getElementById("list");
  box.innerHTML="";

  products.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="card">
        <img src="${p.images[0]}">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <button onclick="addCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

/* إضافة منتج */
function add(){
  let files=images.files;
  let imgs=[];
  let c=0;

  for(let f of files){
    let r=new FileReader();
    r.onload=()=>{
      imgs.push(r.result);
      c++;
      if(c===files.length){
        products.push({
          title:title.value,
          desc:desc.value,
          images:imgs
        });

        localStorage.setItem("products",JSON.stringify(products));
        render();
        closeForm();
      }
    }
    r.readAsDataURL(f);
  }
}

/* سلة */
function addCart(i){
  cart.push(products[i]);
  document.getElementById("cartItems").innerHTML =
    cart.map(c=>`<div style="margin:10px 0">${c.title}</div>`).join("");
}

/* فتح/إغلاق */
function openForm(){form.style.display="flex"}
function closeForm(){form.style.display="none"}
function toggleCart(){cart.classList.toggle("open")}

render();

</script>

</body>
</html>
