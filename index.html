<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bil One Al</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}

body{
  color:#e2e8f0;
  line-height:1.7;
  overflow-x:hidden;

  /* ✨ خلفية احترافية جديدة */
  background: radial-gradient(circle at top, #1b2a4a, #0f172a 40%, #050814);
}

/* ✨ خلفية متحركة (Glow Shapes) */
body::before,
body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(120px);
  opacity:0.4;
  z-index:-1;
  animation: move 12s infinite alternate ease-in-out;
}

body::before{
  background:#38bdf8;
  top:-100px;
  left:-100px;
}

body::after{
  background:#a855f7;
  bottom:-120px;
  right:-120px;
}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(80px,60px)}
}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 10%;background:#0b1220cc;
  backdrop-filter: blur(10px);
  position:sticky;top:0;z-index:10
}

header h1{color:#38bdf8}
nav a{color:#e2e8f0;margin:0 10px;text-decoration:none}
nav a:hover{color:#38bdf8}

/* HERO */
.hero{
  min-height:92vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px 20px;
}

.hero-image{
  width:340px;
  max-width:90%;
  margin-bottom:25px;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation: float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.hero-badge{
  background:#1e293b;
  border:1px solid #334155;
  color:#38bdf8;
  padding:8px 14px;
  border-radius:999px;
  margin-bottom:18px;
  font-size:14px
}

.hero h2{font-size:52px;margin-bottom:14px}
.hero h2 span{color:#38bdf8}
.hero p{max-width:700px;color:#cbd5e1}

.hero .cta{
  margin-top:26px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center
}

.btn{
  padding:12px 22px;
  background:#38bdf8;
  color:#0f172a;
  border:none;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer
}

.btn.outline{
  background:transparent;
  color:#38bdf8;
  border:1px solid #38bdf8
}

section{padding:80px 10%}
h2.section-title{font-size:32px;margin-bottom:10px}
p.section-sub{color:#94a3b8}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:12px
}

.card img{width:100%;border-radius:10px;margin-bottom:10px}

footer{
  text-align:center;
  padding:30px;
  background:#0b1220cc;
  backdrop-filter: blur(10px);
  margin-top:50px;
  color:#94a3b8
}

/* Popup */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  padding:20px
}

.popup-content{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:100%;
  max-width:420px
}

.popup-content input,
.popup-content textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px
}

/* WhatsApp Button */
.whatsapp{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:15px;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s
}

.whatsapp:hover{
  transform:scale(1.05);
  background:#1ebe5d;
}

.action-btn{
  margin-top:8px;
  margin-left:6px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:#fff
}

.edit{background:#f59e0b}
.delete{background:#ef4444}

@media(max-width:768px){
  .hero h2{font-size:34px}
}
</style>
</head>

<body>

<header>
  <h1>Bil One Al</h1>
  <nav>
    <a href="#projects">مشاريعي</a>
    <a href="#contact">تواصل</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">

  <img src="file_00000000ac3c71f7a1b105db20571fdc.png" class="hero-image">

  <div class="hero-badge">BI ONE AL • Portfolio</div>

  <h2>أبني تجارب ويب <span>ذكية وعصرية</span></h2>

  <p>مطور ويب مهتم بالذكاء الاصطناعي وبناء واجهات حديثة وسريعة.</p>

  <div class="cta">
    <a href="#projects" class="btn">شاهد أعمالي</a>
    <a href="#contact" class="btn outline">تواصل معي</a>
  </div>
</div>

<!-- PROJECTS -->
<section id="projects">
  <h2 class="section-title">مشاريعي</h2>

  <button class="btn" onclick="openForm()">➕ إضافة مشروع</button>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h3>إضافة / تعديل مشروع</h3>
      <input type="file" id="imageInput">
      <input type="text" id="titleInput" placeholder="اسم المشروع">
      <textarea id="descInput" rows="4" placeholder="الوصف"></textarea>
      <button class="btn" onclick="saveProject()">حفظ</button>
      <button class="btn" style="background:#ef4444" onclick="closeForm()">إغلاق</button>
    </div>
  </div>

  <div class="cards" id="projectsContainer"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 class="section-title">تواصل معي</h2>
  <p class="section-sub">إذا كنت تريد شراء منتج أو التواصل السريع:</p>

  <!-- WhatsApp -->
  <a class="whatsapp" href="https://wa.me/21694622377" target="_blank">
    📱 تواصل عبر واتساب
  </a>

</section>

<footer>
  © 2026 Bil One Al
</footer>

<script>
let projects = JSON.parse(localStorage.getItem("projects") || "[]");
let editIndex = null;

function openForm(){popup.style.display="flex"}
function closeForm(){popup.style.display="none"}

function saveProject(){
  const file=imageInput.files[0];
  const title=titleInput.value;
  const desc=descInput.value;

  const save=(img)=>{
    const p={image:img,title,desc};
    if(editIndex!=null) projects[editIndex]=p;
    else projects.push(p);
    localStorage.setItem("projects",JSON.stringify(projects));
    display(); closeForm();
  }

  if(file){
    const r=new FileReader();
    r.onload=()=>save(r.result);
    r.readAsDataURL(file);
  }else save("");
}

function display(){
  const c=document.getElementById("projectsContainer");
  c.innerHTML="";
  projects.forEach((p,i)=>{
    c.innerHTML+=`
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
      </div>`;
  });
}
display();
</script>

</body>
        </html>
