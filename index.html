<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bil One Al</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}
    body{background:#0f172a;color:#e2e8f0;line-height:1.7}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px 10%;background:#0b1220;position:sticky;top:0
    }

    header h1{color:#38bdf8}
    nav a{color:#e2e8f0;margin:0 10px;text-decoration:none}
    nav a:hover{color:#38bdf8}

    .hero{
      height:90vh;display:flex;flex-direction:column;
      justify-content:center;align-items:center;text-align:center;padding:0 20px
    }

    .hero h2{font-size:48px;margin-bottom:20px}
    .hero span{color:#38bdf8}

    .btn{
      margin-top:20px;padding:12px 25px;background:#38bdf8;
      color:#0f172a;border:none;border-radius:6px;
      text-decoration:none;font-weight:bold;cursor:pointer
    }

    section{padding:80px 10%}

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;margin-top:40px
    }

    .card{
      background:#1e293b;padding:25px;border-radius:10px;
      transition:0.3s
    }

    .card:hover{transform:translateY(-5px)}

    footer{
      text-align:center;padding:30px;background:#0b1220;
      margin-top:50px;color:#94a3b8
    }

    /* Popup */
    .popup{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .popup-content{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      width:90%;
      max-width:400px;
    }

    @media(max-width:768px){
      .hero h2{font-size:32px}
    }
  </style>
</head>

<body>

<header>
  <h1>Bil One Al</h1>
  <nav>
    <a href="#about">من أنا</a>
    <a href="#projects">مشاريعي</a>
    <a href="#contact">تواصل</a>
  </nav>
</header>

<div class="hero">
  <h2>مرحبًا، أنا <span>Bilal</span> 👋</h2>
  <p>مطور ويب ومهتم بالذكاء الاصطناعي</p>
  <a href="#projects" class="btn">شاهد أعمالي</a>
</div>

<section id="about">
  <h2>من أنا</h2>
  <p>هذا الموقع هو معرض لأعمالي ومشاريعي في تطوير الويب والذكاء الاصطناعي.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>مشاريعي</h2>

  <button onclick="openForm()" class="btn">➕ إضافة مشروع</button>

  <!-- Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <h3>إضافة مشروع جديد</h3>

      <input type="file" id="imageInput" accept="image/*"><br><br>
      <input type="text" id="titleInput" placeholder="اسم المشروع"><br><br>
      <textarea id="descInput" placeholder="وصف المشروع"></textarea><br><br>

      <button onclick="saveProject()" class="btn">حفظ</button>
      <button onclick="closeForm()" class="btn" style="background:red;">إغلاق</button>
    </div>
  </div>

  <div class="cards" id="projectsContainer"></div>
</section>

<section id="contact">
  <h2>تواصل معي</h2>
  <p>example@email.com</p>
</section>

<footer>
  © 2026 Bil One Al
</footer>

<script>
let projects = JSON.parse(localStorage.getItem("projects") || "[]");

function openForm(){
  document.getElementById("popup").style.display = "flex";
}

function closeForm(){
  document.getElementById("popup").style.display = "none";
}

function saveProject(){
  const file = document.getElementById("imageInput").files[0];
  const title = document.getElementById("titleInput").value;
  const desc = document.getElementById("descInput").value;

  if(!file || !title){
    alert("يرجى إدخال البيانات");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(){
    projects.push({
      image: reader.result,
      title,
      desc
    });

    localStorage.setItem("projects", JSON.stringify(projects));
    displayProjects();
    closeForm();
  };

  reader.readAsDataURL(file);
}

function displayProjects(){
  const container = document.getElementById("projectsContainer");
  container.innerHTML = "";

  projects.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" style="width:100%;border-radius:10px;">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
      </div>
    `;
  });
}

displayProjects();
</script>

</body>
</html>
