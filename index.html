<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bi One Al | المتجر الرسمي</title>

<!-- مكتبات Firebase (ضرورية لربط البيانات ليرى الجميع نفس السلع) -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<style>
:root {
    --bg-dark: #020617; 
    --accent-blue: #38bdf8; 
    --card-bg: rgba(15, 23, 42, 0.9);
    --whatsapp-green: #25D366;
}

*{box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0}

body {
  color: white;
  min-height: 100vh;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
    url('https://www.transparenttextures.com/patterns/circuit-board.png'); 
  background-attachment: fixed;
  padding-bottom: 120px; /* مساحة لزر الإضافة عند ظهوره */
}

/* 🔝 الهيدر */
header {
  text-align: center;
  padding: 20px;
  background: rgba(2, 6, 23, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(56, 189, 248, 0.2);
  position: sticky;
  top: 0;
  z-index: 1000;
}

header h1 { 
    color: var(--accent-blue); 
    cursor: pointer; 
    user-select: none;
    letter-spacing: 2px;
}

.hero { text-align: center; padding: 40px 20px; }
.hero h2 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(to left, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.container { padding: 0 5%; }
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
}

/* بطاقة المنتج */
.card {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: 0.3s;
}
.card:hover { border-color: var(--accent-blue); }

.card img { width: 100%; height: 260px; object-fit: cover; }
.card-content { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
.card h3 { font-size: 20px; color: #f8fafc; }
.price { font-size: 24px; color: var(--accent-blue); font-weight: bold; }

/* 🟩 زر الواتساب المستطيل */
.ws-btn {
    background: var(--whatsapp-green);
    color: white;
    text-decoration: none;
    padding: 14px;
    text-align: center;
    border-radius: 4px; /* مستطيل */
    font-weight: bold;
    font-size: 16px;
    transition: 0.3s;
}
.ws-btn:hover { background: #1eb954; }

/* 🔒 أزرار الإدارة (مخفية للزوار) */
#adminAddBtn, .del-btn { display: none; }

/* تظهر فقط عند تفعيل وضع الآدمن */
.admin-mode #adminAddBtn { display: flex; }
.admin-mode .del-btn { display: block; }

.fixed-add-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-blue);
    color: black;
    padding: 15px 40px;
    border-radius: 50px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    z-index: 2000;
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
    align-items: center;
    gap: 10px;
}

.del-btn {
    background: #ef4444; color: white; border: none;
    padding: 8px; border-radius: 4px; cursor: pointer;
    font-size: 12px; margin-top: 5px;
}

/* نافذة الإضافة (Modal) */
.modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    justify-content: center; align-items: center; z-index: 3000;
}
.modal-box { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--accent-blue); }
input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #020617; color: white; border: 1px solid #334155; border-radius: 6px; }

</style>
</head>
<body class=""> <!-- سيتم إضافة كلاس admin-mode هنا عند كتابة السر -->

<header>
    <h1 id="secretLogo">BI ONE AL</h1>
</header>

<div class="hero">
    <h2>السلعة الموجودة توّة 🇹🇳</h2>
    <p style="color: #94a3b8">قضيتك الكل في بلاصة واحدة.. جديد ومستعمل بأرخص السوام!</p>
</div>

<div class="container">
    <div class="cards" id="productList">
        <!-- المنتجات تظهر هنا تلقائياً من فايبربيز -->
    </div>
</div>

<!-- زر إضافة منتج (يظهر لك فقط) -->
<button class="fixed-add-btn" id="adminAddBtn" onclick="openModal()">
    <span>➕ زيد سلعة جديدة</span>
</button>

<!-- نافذة إضافة السلعة -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 style="margin-bottom:10px">هبّط سلعة جديدة</h3>
        <input id="title" placeholder="اسم السلعة (مثلاً: هاتف سامسونج)">
        <textarea id="desc" placeholder="وصف السلعة (الحالة، المقاس، جديد/قديم...)"></textarea>
        <input type="number" id="price" placeholder="السعر (د.ت)">
        <p style="font-size:12px; color:#94a3b8; margin-top:5px">اختر صورة السلعة:</p>
        <input type="file" id="imgFile" accept="image/*">
        <button onclick="uploadProduct()" style="width: 100%; padding: 15px; background: var(--accent-blue); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;">نشر السلعة للجميع</button>
        <button onclick="closeModal()" style="width: 100%; background: none; color: white; border: none; margin-top: 10px; cursor: pointer;">إغلاق</button>
    </div>
</div>

<script>
// ⚠️ لكي يعمل الموقع، ضع إعدادات Firebase الخاصة بك هنا:
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "your-project.firebaseapp.com",
  projectId: "your-project-id",
  storageBucket: "your-project.appspot.com",
  messagingSenderId: "...",
  appId: "..."
};

// تشغيل Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 1. جلب السلع وعرضها للزوار
function loadProducts() {
    db.collection("my_store").orderBy("createdAt", "desc").onSnapshot(snap => {
        const list = document.getElementById("productList");
        list.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div class="card-content">
                        <h3>${p.title}</h3>
                        <p style="color:#94a3b8; font-size:14px">${p.desc}</p>
                        <div class="price">${p.price} د.ت</div>
                        <a href="https://wa.me/21694622377?text=أهلاً، حبيت نسأل على السلعة هاذي: ${p.title}" target="_blank" class="ws-btn">
                            اطلب عبر واتساب ✅
                        </a>
                        <button class="del-btn" onclick="deleteProduct('${doc.id}')">حذف السلعة 🗑️</button>
                    </div>
                </div>
            `;
        });
    });
}

// 2. إضافة منتج جديد (قاعدة بيانات حقيقية)
async function uploadProduct() {
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const price = document.getElementById("price").value;
    const file = document.getElementById("imgFile").files[0];

    if(!title || !price || !file) return alert("عيّش خويا كمّل عمّر البيانات الكل!");

    const reader = new FileReader();
    reader.onload = async function(e) {
        await db.collection("my_store").add({
            title, desc, price, img: e.target.result, createdAt: new Date()
        });
        alert("تمت الإضافة بنجاح والكل يراها الآن!");
        closeModal();
    };
    reader.readAsDataURL(file);
}

// 3. نظام الدخول السري (خاص بك فقط)
let clickCount = 0;
document.getElementById("secretLogo").onclick = function() {
    clickCount++;
    if(clickCount === 3) {
        const pass = prompt("أدخل كلمة سر الإدارة:");
        if(pass === "07471392") { 
            document.body.classList.add("admin-mode");
            alert("مرحباً بك! يمكنك الآن إضافة وحذف السلع.");
        } else {
            alert("كلمة سر خاطئة!");
        }
        clickCount = 0;
    }
};

// 4. حذف السلعة
async function deleteProduct(id) {
    if(confirm("متاكد تحب تفسخ السلعة هاذي نهائياً؟")) {
        await db.collection("my_store").doc(id).delete();
    }
}

function openModal() { document.getElementById("modal").style.display = "flex"; }
function closeModal() { document.getElementById("modal").style.display = "none"; }

loadProducts();
</script>

</body>
</html>
