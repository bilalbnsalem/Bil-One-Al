<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pro Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 10%;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

header h1{
  color:#38bdf8;
}

/* BUTTON */
.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:white;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.actions{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.edit{background:#f59e0b}
.delete{background:#ef4444}
.cart{background:#22c55e}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

textarea{height:80px;resize:none}

/* CART */
.cart-box{
  padding:20px;
  background:#111827;
}

</style>
</head>

<body>

<header>
  <h1>My Store</h1>
  <button class="btn" onclick="openForm()">➕ منتج</button>
</header>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="formTitle">إضافة منتج</h3>

    <input type="file" id="img">
    <input type="text" id="name" placeholder="اسم المنتج">
    <textarea id="desc" placeholder="الوصف"></textarea>

    <button class="btn" onclick="save()">حفظ</button>
    <button class="btn" style="background:red" onclick="closeForm()">إغلاق</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart-box">
  <h3>🛒 السلة</h3>
  <button class="btn" onclick="checkout()">إرسال الطلب واتساب</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];
let editIndex = null;
let oldImg = "";

/* OPEN / CLOSE */
function openForm(){
  document.getElementById("popup").style.display="flex";
}

function closeForm(){
  document.getElementById("popup").style.display="none";
  document.getElementById("name").value="";
  document.getElementById("desc").value="";
  document.getElementById("img").value="";
  editIndex=null;
}

/* SAVE PRODUCT */
function save(){
  const file=document.getElementById("img").files[0];
  const name=document.getElementById("name").value;
  const desc=document.getElementById("desc").value;

  const saveData=(img)=>{
    const p={img,name,desc};

    if(editIndex!==null){
      products[editIndex]=p;
    }else{
      products.push(p);
    }

    localStorage.setItem("products",JSON.stringify(products));
    render();
    closeForm();
  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>saveData(reader.result);
    reader.readAsDataURL(file);
  }else{
    saveData(oldImg);
  }
}

/* DELETE */
function del(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  render();
}

/* EDIT */
function edit(i){
  const p=products[i];
  document.getElementById("name").value=p.name;
  document.getElementById("desc").value=p.desc;
  oldImg=p.img;
  editIndex=i;
  openForm();
}
