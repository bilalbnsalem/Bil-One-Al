<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bil One Al Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}

body{
  color:#e2e8f0;
  background: radial-gradient(circle at top, #1b2a4a, #0f172a 40%, #050814);
  overflow-x:hidden;
}

/* خلفية */
body::before,
body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(120px);
  opacity:0.4;
  z-index:-1;
  animation: move 12s infinite alternate;
}
body::before{background:#38bdf8;top:-100px;left:-100px;}
body::after{background:#a855f7;bottom:-120px;right:-120px;}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(80px,60px)}
}

/* header */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 10%;
  background:#0b1220cc;
  backdrop-filter:blur(10px);
  position:sticky;top:0;
  z-index:10;
}

header h1{color:#38bdf8}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h2{
  font-size:28px;
  margin:20px 0;
}

/* BUTTON */
.btn{
  background:#38bdf8;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:#000;
  font-weight:bold;
}

/* PRODUCTS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px 10%;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* cart button */
.cart-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:#38bdf8;
  color:#000;
  padding:10px 14px;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  z-index:20;
}

/* CART PANEL */
.cart{
  position:fixed;
  top:0;
  right:-400px;
  width:320px;
  height:100%;
  background:#0b1220;
  padding:20px;
  transition:0.3s;
  z-index:999;
  overflow-y:auto;
}

.cart.open{right:0}

.cart h3{margin-bottom:15px}

.cart-item{
  background:#1e293b;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

/* whatsapp modern */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  left:20px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-decoration:none;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#1e293b;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:12px;
}

.popup-content input,
.popup-content textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

</style>
</head>

<body>

<header>
  <h1>Bil One Al</h1>
  <button class="btn" onclick="openForm()">➕ منتج</button>
</header>

<!-- HERO -->
<div class="hero">
  <h2>بساطة في التسوق دقة في الاختيار وسرعة في التوصيل نحن هنا لخدمتكم</h2>
</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>

<!-- CART PANEL -->
<div class="cart" id="cart">
  <h3>سلة المشتريات</h3>
  <div id="cartItems"></div>
</div>

<!-- PRODUCTS -->
<div class="cards" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>إضافة منتج</h3>
    <input type="text" id="title" placeholder="اسم المنتج">
    <textarea id="desc" placeholder="الوصف"></textarea>
    <input type="file" id="images" multiple>
    <button class="btn" onclick="save()">حفظ</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp-float" href="https://wa.me/21694622377" target="_blank">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("products")||"[]");
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* render products */
function render(){
  let box=document.getElementById("products");
  box.innerHTML="";

  products.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.images[0]}">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <button class="btn" onclick="add(${i})">أضف للسلة</button>
    </div>`;
  });
}

/* save product */
function save(){
  let files=document.getElementById("images").files;
  let arr=[];

  let count=0;

  for(let f of files){
    let r=new FileReader();
    r.onload=()=>{
      arr.push(r.result);
      count++;
      if(count===files.length){
        products.push({
          title:title.value,
          desc:desc.value,
          images:arr
        });

        localStorage.setItem("products",JSON.stringify(products));
        render();
        closeForm();
      }
    }
    r.readAsDataURL(f);
  }
}

/* cart */
function add(i){
  cart.push(products[i]);
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  document.getElementById("count").innerText=cart.length;

  let box=document.getElementById("cartItems");
  box.innerHTML="";

  cart.forEach((c,i)=>{
    box.innerHTML+=`
    <div class="cart-item">
      <p>${c.title}</p>
    </div>`;
  });
}

/* toggle cart */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

/* popup */
function openForm(){
  popup.style.display="flex"
}
function closeForm(){
  popup.style.display="none"
}

render();
updateCart();

</script>

</body>
</html>
