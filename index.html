<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bil One Al</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}

body{
  color:#e2e8f0;
  line-height:1.7;
  overflow-x:hidden;
  background: radial-gradient(circle at top, #1b2a4a, #0f172a 40%, #050814);
}

/* خلفية */
body::before,
body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter: blur(120px);
  opacity:0.4;
  z-index:-1;
  animation: move 12s infinite alternate ease-in-out;
}

body::before{background:#38bdf8;top:-100px;left:-100px;}
body::after{background:#a855f7;bottom:-120px;right:-120px;}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(80px,60px)}
}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 10%;background:#0b1220cc;
  backdrop-filter: blur(10px);
  position:sticky;top:0;z-index:10
}

header h1{color:#38bdf8}
nav a{color:#e2e8f0;margin:0 10px;text-decoration:none}
nav a:hover{color:#38bdf8}

/* HERO */
.hero{
  min-height:92vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px 20px;
}

.hero-image{
  width:340px;
  max-width:90%;
  margin-bottom:25px;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation: float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.hero-badge{
  background:#1e293b;
  border:1px solid #334155;
  color:#38bdf8;
  padding:8px 14px;
  border-radius:999px;
  margin-bottom:18px;
  font-size:14px
}

.hero h2{font-size:32px;margin-bottom:14px}
.hero h2 span{color:#38bdf8}

/* زر واتساب */
.whatsapp{
  display:inline-block;
  margin-top:20px;
  background:#25D366;
  color:#fff;
  padding:12px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* المنتجات */
section{padding:80px 10%}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

/* سلايدر الصور داخل المنتج */
.slider{
  position:relative;
  width:100%;
  height:200px;
  overflow:hidden;
  border-radius:10px;
}

.slider img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:none;
}

.slider img.active{
  display:block;
}

.slider button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:white;
  border:none;
  cursor:pointer;
  padding:5px 10px;
}

.prev{left:5px}
.next{right:5px}

</style>
</head>

<body>

<header>
  <h1>Bil One Al</h1>
</header>

<!-- HERO -->
<div class="hero">

  <img src="file_00000000ac3c71f7a1b105db20571fdc.png" class="hero-image">

  <div class="hero-badge">BI ONE AL • Shop</div>

  <!-- النص الجديد -->
  <h2>
    بساطة في التسوق دقة في الاختيار وسرعة في التوصيل نحن هنا لخدمتكم
  </h2>

  <a class="whatsapp" href="https://wa.me/21694622377" target="_blank">
    📱 تواصل واتساب
  </a>
</div>

<!-- المنتجات (بدون كلمة "مشاريعي") -->
<section>

  <div class="cards" id="products"></div>

</section>

<script>
// منتجات مع عدة صور
let data = [
  {
    title:"منتج 1",
    desc:"وصف المنتج",
    images:[
      "https://picsum.photos/400/300?1",
      "https://picsum.photos/400/300?2",
      "https://picsum.photos/400/300?3"
    ]
  }
];

function render(){
  let box=document.getElementById("products");
  box.innerHTML="";

  data.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="card">

      <div class="slider" id="slider${i}">
        ${p.images.map((img,ix)=>`
          <img src="${img}" class="${ix===0?'active':''}">
        `).join('')}

        <button class="prev" onclick="change(${i},-1)">‹</button>
        <button class="next" onclick="change(${i},1)">›</button>
      </div>

      <h3>${p.title}</h3>
      <p>${p.desc}</p>

    </div>`;
  });
}

function change(i,dir){
  let slider=document.querySelectorAll(`#slider${i} img`);
  let index=[...slider].findIndex(img=>img.classList.contains("active"));

  slider[index].classList.remove("active");

  index+=dir;
  if(index<0) index=slider.length-1;
  if(index>=slider.length) index=0;

  slider[index].classList.add("active");
}

render();
</script>

</body>
</html>
