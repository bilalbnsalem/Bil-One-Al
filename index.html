<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bil One Al</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#e2e8f0;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 10%;
  background:rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(56,189,248,0.1);
}

header h1{color:#38bdf8}

nav a{
  color:#cbd5e1;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover{color:#38bdf8}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:52px;
}

.hero span{color:#38bdf8}

.hero p{color:#94a3b8;margin-top:10px}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 28px;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

/* SECTIONS */
section{
  padding:80px 10%;
}

section h2{
  color:#38bdf8;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:rgba(30,41,59,0.7);
  border:1px solid rgba(148,163,184,0.1);
  border-radius:16px;
  padding:16px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
}

/* ACTION */
.action-btn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

.edit{background:#f59e0b}
.delete{background:#ef4444}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:420px;
  border:1px solid rgba(56,189,248,0.2);
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
  outline:none;
}

textarea{height:90px;resize:none}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#020617;
  color:#64748b;
}
</style>
</head>

<body>

<header>
  <h1>Bil One Al</h1>
  <nav>
    <a href="#about">من أنا</a>
    <a href="#projects">مشاريعي</a>
    <a href="#contact">تواصل</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h2>مرحبًا، أنا <span>Bilal</span> 👋</h2>
  <p>مطور ويب ومهتم بالذكاء الاصطناعي</p>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>من أنا</h2>
  <p>هذا موقع يعرض مشاريعي بطريقة احترافية.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>مشاريعي</h2>

  <button class="btn" onclick="openForm()">➕ إضافة مشروع</button>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h3 id="formTitle">إضافة مشروع</h3>

      <input type="file" id="imageInput" accept="image/*">
      <input type="text" id="titleInput" placeholder="اسم المشروع">
      <textarea id="descInput" placeholder="وصف المشروع"></textarea>

      <button class="btn" onclick="saveProject()">حفظ</button>
      <button class="btn" style="background:red" onclick="closeForm()">إغلاق</button>
    </div>
  </div>

  <div class="cards" id="projectsContainer"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>تواصل معي</h2>
  <p>example@email.com</p>
</section>

<footer>
  © 2026 Bil One Al
</footer>
