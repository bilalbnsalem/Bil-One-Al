<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bil-One-Al | Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* إعدادات عامة - النمط البسيط (Minimalist) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            padding-bottom: 80px; /* مساحة للزر الثابت في الأسفل */
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -1px;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #000;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* معرض الصور */
        .gallery-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .main-image {
            width: 100%;
            background: #f9f9f9;
            display: block;
        }

        .thumbnails {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
        }

        .thumb {
            width: 70px;
            height: 70px;
            border: 1px solid #eee;
            cursor: pointer;
            object-fit: cover;
        }

        .thumb.active {
            border: 2px solid #000;
        }

        /* تفاصيل المنتج */
        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .current-price {
            color: #e60000; /* أحمر بارز */
            font-size: 22px;
            font-weight: 700;
        }

        .old-price {
            color: #999;
            text-decoration: line-through;
            font-size: 16px;
        }

        .discount-tag {
            background: #fdf0f0;
            color: #e60000;
            padding: 2px 8px;
            border: 1px solid #e60000;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* زر الشراء الثابت (Sticky CTA) */
        .footer-cta {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 2000;
        }

        .buy-button {
            display: block;
            width: 100%;
            background: #000000;
            color: #ffffff;
            text-align: center;
            padding: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .buy-button:active {
            transform: scale(0.98);
            background: #333;
        }

        /* تحسينات للجوال (Mobile First) */
        @media (min-width: 768px) {
            .container {
                display: flex;
                max-width: 1000px;
                margin: 0 auto;
                align-items: flex-start;
                padding-top: 40px;
            }
            .gallery-container, .product-info {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Bil-One-Al</div>
        <div class="nav-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div class="cart-icon">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="gallery-container">
            <img src="https://via.placeholder.com/600x600/f9f9f9/000000?text=Produit+Principal" alt="Produit" class="main-image" id="mainImg">
            <div class="thumbnails">
                <img src="https://via.placeholder.com/100" class="thumb active" onclick="changeImage(this.src, this)">
                <img src="https://via.placeholder.com/100/000000/FFFFFF?text=Noir" class="thumb" onclick="changeImage(this.src, this)">
                <img src="https://via.placeholder.com/100/EEEEEE/000000?text=Angle" class="thumb" onclick="changeImage(this.src, this)">
            </div>
        </div>

        <div class="product-info">
            <h1 class="product-title">Basket Premium LC Hommes</h1>
            
            <div class="price-container">
                <span class="current-price">110.00 DT</span>
                <span class="old-price">199.00 DT</span>
                <span class="discount-tag">-45%</span>
            </div>

            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">
                Livraison gratuite sur toute la Tunisie. Qualité garantie par Bil-One-Al.
            </p>
        </div>
    </div>

    <div class="footer-cta">
        <a href="https://wa.me/21694622377?text=Bonjour, je souhaite acheter le produit: Basket Premium LC" class="buy-button">
            ACHETER MAINTENANT
        </a>
    </div>

    <script>
        // وظيفة تبديل الصور
        function changeImage(src, el) {
            document.getElementById('mainImg').src = src;
            let thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
